<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialisation du mot de passe — Santé Féminine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--cream-dark:#F0EBE1;--rose:#E8C5BB;--rose-deep:#C9957F;--rose-pale:#F7EDE8;--gold:#C8A96E;--gold-light:#F0E4C0;--text-dark:#2C2420;--text-mid:#6B5B52;--text-light:#A09080;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--white);border-radius:24px;padding:48px 40px;width:440px;max-width:100%;box-shadow:0 16px 64px rgba(44,36,32,.12);}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--text-dark);text-align:center;margin-bottom:28px;}
.logo span{color:var(--rose-deep);}
.icon{font-size:48px;text-align:center;margin-bottom:16px;}
.title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--text-dark);text-align:center;margin-bottom:8px;}
.subtitle{font-size:13.5px;color:var(--text-light);text-align:center;font-weight:300;line-height:1.6;margin-bottom:32px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:7px;letter-spacing:.03em;}
.form-input{width:100%;padding:13px 16px;border:1.5px solid var(--cream-dark);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text-dark);background:var(--cream);outline:none;transition:all .2s;}
.form-input:focus{border-color:var(--rose-deep);background:var(--white);}
.error{font-size:12px;color:#C0392B;margin-top:5px;display:none;}
.btn{width:100%;padding:14px;background:var(--text-dark);color:white;border:none;border-radius:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn:hover{background:var(--rose-deep);}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-light);}
.back-link a{color:var(--rose-deep);text-decoration:none;font-weight:500;}
.success-box{background:var(--rose-pale);border:1px solid var(--rose);border-radius:14px;padding:20px;text-align:center;display:none;}
.success-box-icon{font-size:36px;margin-bottom:10px;}
.success-box-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text-dark);margin-bottom:6px;}
.success-box-text{font-size:13px;color:var(--text-mid);font-weight:300;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Santé <span>Féminine</span></div>
  <div id="formSection">
    <div class="icon">🔑</div>
    <div class="title">Nouveau mot de passe</div>
    <p class="subtitle">Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>
    <div class="form-group">
      <label class="form-label">Nouveau mot de passe</label>
      <input class="form-input" type="password" id="newPassword" placeholder="Minimum 8 caractères">
      <div class="error" id="passwordError"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe</label>
      <input class="form-input" type="password" id="confirmPassword" placeholder="Répétez votre mot de passe">
      <div class="error" id="confirmError"></div>
    </div>
    <button class="btn" onclick="resetPassword()">Enregistrer le nouveau mot de passe</button>
    <div class="back-link"><a href="auth-connexion.html">← Retour à la connexion</a></div>
  </div>
  <div class="success-box" id="successBox">
    <div class="success-box-icon">✅</div>
    <div class="success-box-title">Mot de passe modifié !</div>
    <p class="success-box-text">Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter.</p>
    <br>
    <a href="auth-connexion.html" style="color:var(--rose-deep);font-weight:500;font-size:14px;">Se connecter →</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kiavvxomyyvwuexjupdf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYXZ2eG9teXl2d3VleGp1cGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTEzOTQsImV4cCI6MjA5NjQyNzM5NH0.d1919fG_0HMdKPcNSbrQTvQK4YyYLQSWvw7vYsMYMnU';

async function resetPassword() {
  const pwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const pwdErr = document.getElementById('passwordError');
  const confErr = document.getElementById('confirmError');
  pwdErr.style.display = 'none';
  confErr.style.display = 'none';

  if (pwd.length < 8) {
    pwdErr.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
    pwdErr.style.display = 'block';
    return;
  }
  if (pwd !== confirm) {
    confErr.textContent = 'Les mots de passe ne correspondent pas.';
    confErr.style.display = 'block';
    return;
  }

  // Récupérer le token depuis l'URL
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const accessToken = params.get('access_token');

  if (!accessToken) {
    pwdErr.textContent = 'Lien invalide ou expiré. Recommencez la procédure.';
    pwdErr.style.display = 'block';
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${accessToken}`
    },
    body: JSON.stringify({ password: pwd })
  });

  if (res.ok) {
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  } else {
    pwdErr.textContent = 'Une erreur est survenue. Réessayez.';
    pwdErr.style.display = 'block';
  }
}
</script>
</body>
</html>
